<svg width="680" height="520" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Uintegrus logo</title>
  <desc>Logo principal de Uintegrus: escudo geométrico con pilares internos</desc>

  <rect width="680" height="520" fill="white"/>

  <!-- Escudo exterior -->
  <path d="M340 60 L440 95 L440 210 Q440 290 340 335 Q240 290 240 210 L240 95 Z"
        fill="none" stroke="#111111" stroke-width="3" stroke-linejoin="round"/>

  <!-- Arco interior -->
  <path d="M290 115 L290 200 Q290 255 340 278 Q390 255 390 200 L390 115 Z"
        fill="none" stroke="#111111" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Pilar izquierdo -->
  <rect x="295" y="175" width="16" height="90" rx="2" fill="#111111"/>
  <!-- Pilar central -->
  <rect x="332" y="155" width="16" height="110" rx="2" fill="#111111"/>
  <!-- Pilar derecho -->
  <rect x="369" y="175" width="16" height="90" rx="2" fill="#111111"/>

  <!-- Base horizontal -->
  <rect x="287" y="265" width="106" height="5" rx="2" fill="#111111"/>
  <!-- Línea superior -->
  <rect x="287" y="150" width="106" height="3" rx="1" fill="#111111"/>

  <!-- Punto corona -->
  <circle cx="340" cy="75" r="5" fill="#111111"/>

  <!-- Texto principal -->
  <text x="340" y="395" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="38" font-weight="500" fill="#111111" letter-spacing="6">UINTEGRUS</text>

  <!-- Subtexto -->
  <text x="340" y="425" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" fill="#666666" letter-spacing="8">UNIFIED SYSTEMS</text>

  <!-- Líneas decorativas -->
  <line x1="168" y1="408" x2="235" y2="408" stroke="#999999" stroke-width="0.8"/>
  <line x1="445" y1="408" x2="512" y2="408" stroke="#999999" stroke-width="0.8"/>
</svg>
